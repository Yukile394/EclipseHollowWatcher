name: Build

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      # This repository intentionally does not commit the binary
      # gradle/wrapper/gradle-wrapper.jar (see README "Gradle Wrapper"
      # section). We generate it in an EMPTY scratch directory (not this
      # project) so the command never has to configure/evaluate our
      # build.gradle (and therefore never touches the fabric-loom plugin)
      # with whatever Gradle version happens to be pre-installed on the
      # runner. The generated wrapper files are then copied into the repo.
      - name: Set up temporary Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          cache-disabled: true

      - name: Generate Gradle wrapper in an isolated scratch dir
        run: |
          mkdir -p /tmp/wrapper-scratch
          cd /tmp/wrapper-scratch
          touch settings.gradle
          gradle wrapper --gradle-version 8.11.1
          cp -r gradle "$GITHUB_WORKSPACE/"
          cp gradlew "$GITHUB_WORKSPACE/"
          cp gradlew.bat "$GITHUB_WORKSPACE/"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build with Gradle wrapper
        run: ./gradlew clean build --no-build-cache --rerun-tasks --stacktrace

      - name: Upload built jar artifacts
        uses: actions/upload-artifact@v4
        with:
          name: eclipse-hollow-watcher
          path: |
            build/libs/*.jar
            !build/libs/*-dev.jar
            !build/libs/*-sources.jar
          if-no-files-found: error
